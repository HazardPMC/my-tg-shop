<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kovalevskiy_shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }

        .brand-header {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin: 20px 0;
            color: #ff3333;
            text-transform: lowercase;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 5px;
            margin-bottom: 10px;
            display: block;
        }

        .product-name {
            font-size: 14px;
            margin-bottom: 5px;
            height: 35px;
            overflow: hidden;
        }

        .price {
            color: #ff3333;
            font-weight: bold;
            margin-bottom: 10px;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }

        button:active {
            background: #ccc;
        }
    </style>
</head>
<body>

    <div class="brand-header">kovalevskiy_shop</div>

    <div class="grid">
        <div class="card">
            <img src="photo_2026-06-19_16-41-29.jpg" alt="Zdarova Bedolagi">
            <div class="product-name">Zdarova Bedolagi</div>
            <div class="price">1500 грн</div>
            <button onclick="sendOrder('Zdarova Bedolagi', '1500 грн')">ЗАКАЗАТЬ</button>
        </div>

        <div class="card">
            <img src="photo_2026-06-19_16-41-40.jpg" alt="Sex Royalty">
            <div class="product-name">Sex Royalty</div>
            <div class="price">1500 грн</div>
            <button onclick="sendOrder('Sex Royalty', '1500 грн')">ЗАКАЗАТЬ</button>
        </div>

        <div class="card">
            <img src="photo_2026-06-19_16-41-43.jpg" alt="Футболка">
            <div class="product-name">Крутая модель</div>
            <div class="price">1500 грн</div>
            <button onclick="sendOrder('Крутая модель', '1500 грн')">ЗАКАЗАТЬ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendOrder(product, price) {
            const data = {
                product: product,
                price: price
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
